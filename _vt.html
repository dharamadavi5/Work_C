<!DOCTYPE html><html><head><meta charset=utf-8><style>
  :root{--cream:#f7f2e9;--cream-2:#efe6d5;--ink:#1c1a15;--ink-2:#26231a;--ink-soft:#5c5648;--tan:#ad8760;--tan-deep:#7c5c39;--tan-light:#d8bd93;--line:rgba(34,31,25,0.13);--line-dark:rgba(247,242,233,0.16);--card-bg:#fffdf9;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:auto;}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  h1,h2,h3,.serif{font-family:Georgia,"Times New Roman",serif;font-weight:400;margin:0;}
  a{color:inherit;} img{max-width:100%;display:block;}
  .container{max-width:1220px;margin:0 auto;padding:0 40px;}
  .eyebrow{text-transform:uppercase;letter-spacing:0.22em;font-size:11.5px;color:var(--tan-deep);font-weight:600;}
  .eyebrow.on-dark{color:var(--tan-light);}
  .progress-bar{position:fixed;top:0;left:0;right:0;height:2.5px;z-index:700;background:transparent;}
  .progress-fill{height:100%;width:0;background:var(--tan);}
  nav.topnav{position:fixed;top:0;left:0;right:0;z-index:500;background:rgba(247,242,233,0.97);border-bottom:1px solid var(--line);}
  .topnav-inner{max-width:1220px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:62px;}
  .brand{font-family:Georgia,serif;font-size:18px;letter-spacing:0.04em;}

  .navlinks{display:flex;gap:22px;font-size:12.5px;letter-spacing:0.03em;align-items:center;}

  .navtoggle{display:none;background:none;border:1px solid var(--line);border-radius:6px;width:42px;height:42px;font-size:18px;cursor:pointer;color:var(--ink);align-items:center;justify-content:center;}
  .hero{position:relative;min-height:100vh;min-height:100svh;display:flex;align-items:flex-end;background-size:cover;background-position:center 42%;}
  .hero::before{content:'';position:absolute;inset:0;background:linear-gradient(70deg,rgba(12,10,7,0.9) 0%,rgba(12,10,7,0.66) 38%,rgba(12,10,7,0.22) 68%,rgba(12,10,7,0.08) 100%);}
  .hero::after{content:'';position:absolute;left:0;right:0;bottom:0;height:44%;background:linear-gradient(0deg,rgba(12,10,7,0.72) 0%,rgba(12,10,7,0) 100%);}
  .hero-inner{position:relative;z-index:2;padding:128px 40px 84px;max-width:1220px;margin:0 auto;width:100%;color:#f7f2e9;}
  .hero-kicker{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
  .hero-kicker .dot{width:6px;height:6px;border-radius:50%;background:var(--tan-light);}
  .hero h1{font-size:clamp(38px,7vw,74px);margin:0 0 14px;line-height:1.05;max-width:15ch;}
  .hero .role{font-size:clamp(15px,2vw,19px);color:var(--tan-light);letter-spacing:0.03em;margin-bottom:20px;}

  .hero-cta{display:flex;gap:14px;flex-wrap:wrap;}

  .home-head{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;margin-bottom:12px;}
  .home-title{font-size:clamp(22px,3.1vw,31px);}
  .home-place{font-size:12.5px;letter-spacing:0.06em;text-transform:uppercase;color:var(--tan-deep);}
  .home-blurb{font-size:15.5px;line-height:1.75;color:var(--ink-soft);max-width:700px;margin:0 0 32px;}
  .dark .home{border-top-color:var(--line-dark);} .dark .home-blurb{color:#c7bca3;} .dark .home-place{color:var(--tan-light);}
  .gal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px 20px;}
  .draw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px 22px;}
  .arch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px 22px;}
  .card{margin:0;cursor:pointer;}

  .card-media img{width:100%;height:100%;transition:transform .55s cubic-bezier(.2,.6,.2,1);}
  .card-media.cover img{object-fit:cover;}
  .card-media.contain img{object-fit:contain;background:#fbf8f1;}

  .zoom-hint{position:absolute;right:12px;bottom:12px;background:rgba(20,17,12,0.72);color:#f7f2e9;font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;padding:6px 11px;border-radius:2px;opacity:0;transform:translateY(4px);transition:opacity .25s,transform .25s;}

  .lead-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px;}

  .lead-card .role{font-family:Georgia,serif;font-size:19px;margin-bottom:4px;} .lead-card .org{font-size:12.5px;color:var(--tan-deep);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:14px;}

  .tq-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;}
  .tq{margin:0;border-top:2px solid var(--tan);padding-top:20px;} .tq p{font-size:15.5px;line-height:1.7;color:var(--ink-soft);font-style:italic;margin:0 0 14px;} .tq cite{font-style:normal;font-size:11.5px;color:var(--tan-deep);text-transform:uppercase;letter-spacing:0.05em;}
  .timeline{position:relative;padding-left:34px;} .timeline::before{content:'';position:absolute;left:5px;top:8px;bottom:8px;width:1px;background:var(--line);}

  .tl-item::before{content:'';position:absolute;left:-34px;top:5px;width:11px;height:11px;border-radius:50%;background:var(--cream);border:2px solid var(--tan);}

  .tl-org{font-size:14px;color:var(--ink-soft);margin-bottom:10px;} .tl-item ul{margin:0;padding-left:18px;color:var(--ink-soft);font-size:14.5px;line-height:1.7;} .tl-item li{margin-bottom:4px;}

  .pill-row{display:flex;flex-wrap:wrap;gap:8px;} .pill{border:1px solid var(--line);padding:7px 13px;border-radius:20px;font-size:13px;color:var(--ink-soft);background:var(--card-bg);}

  .edu-card .deg{font-family:Georgia,serif;font-size:21px;margin-bottom:6px;} .edu-card .inst{color:var(--ink-soft);font-size:14.5px;margin-bottom:4px;} .edu-card .meta{font-size:12.5px;color:var(--tan-deep);}
  .contact-wrap{background:var(--ink);color:var(--cream);border-radius:2px;padding:66px 56px;display:grid;grid-template-columns:1.2fr 1fr;gap:40px;align-items:center;}

  .clabel{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#9c8f74;margin-bottom:3px;} .cval{font-family:Georgia,serif;font-size:17px;color:#f7f2e9;word-break:break-word;} .clink:hover .cval{color:var(--tan-light);}
  .enquiry{background:var(--ink);color:var(--cream);}

  .enquiry-wrap h2{color:#f7f2e9;font-size:clamp(28px,4vw,40px);} .enquiry-wrap .lead{color:#c7bca3;line-height:1.75;margin-top:16px;font-size:16px;}
  .enquiry-form{display:grid;grid-template-columns:1fr 1fr;gap:16px;} .enquiry-form .full{grid-column:1/-1;}

  .hp{position:absolute;left:-9999px;} .form-note{font-size:12px;color:#9c8f74;margin-top:4px;}

  .visit-counter{display:none;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft);letter-spacing:0.04em;} .visit-counter .vdot{width:6px;height:6px;border-radius:50%;background:#5aa469;box-shadow:0 0 0 3px rgba(90,164,105,0.18);} .visit-counter b{font-family:Georgia,serif;font-weight:400;color:var(--ink);font-size:14px;}
  .lightbox{position:fixed;inset:0;background:rgba(12,10,7,0.975);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column;padding:24px 16px;}
  .lightbox.open{display:flex;} .lightbox img{max-width:min(1360px,95vw);max-height:76vh;object-fit:contain;border:1px solid rgba(255,255,255,0.08);background:#fff;}
  .lb-caption{color:#f0e8d8;text-align:center;margin-top:16px;padding:0 60px;} .lb-caption .t{font-family:Georgia,serif;font-size:18px;} .lb-caption .s{font-size:13px;color:#b8ab8e;margin-top:5px;}
  .lb-close,.lb-prev,.lb-next{position:absolute;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);color:#f0e8d8;width:46px;height:46px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:21px;}
  .lb-close:hover,.lb-prev:hover,.lb-next:hover{background:rgba(255,255,255,0.18);}
  .lb-close{top:18px;right:18px;} .lb-prev{left:14px;top:50%;transform:translateY(-50%);} .lb-next{right:14px;top:50%;transform:translateY(-50%);} .lb-count{position:absolute;top:24px;left:24px;color:#b8ab8e;font-size:12px;}
  .reveal{opacity:0;transform:translateY(24px);transition:opacity .7s cubic-bezier(.2,.6,.2,1),transform .7s cubic-bezier(.2,.6,.2,1);} .reveal.in{opacity:1;transform:translateY(0);}
  @media (prefers-reduced-motion:reduce){.reveal{transition:none!important;opacity:1!important;transform:none!important;} .card:hover .card-media img{transform:none;}}
  body.nav-open .navlinks{display:flex;position:fixed;top:62px;left:0;right:0;background:var(--cream);flex-direction:column;padding:16px 28px 24px;gap:4px;border-bottom:1px solid var(--line);max-height:calc(100vh - 62px);overflow-y:auto;}
  body.nav-open .navlinks a{padding:13px 4px;font-size:14px;} body.nav-open .navlinks a.nav-cta{text-align:center;}
  @media (max-width:940px){.navlinks{display:none;} .navtoggle{display:flex;} .about-grid{grid-template-columns:1fr;gap:38px;} .skills-grid{grid-template-columns:1fr 1fr;gap:28px;} .lead-grid{grid-template-columns:1fr;gap:18px;} .glance-grid{grid-template-columns:repeat(3,1fr);gap:26px 20px;} .value-grid{grid-template-columns:1fr 1fr;gap:26px;} .gal-grid{grid-template-columns:repeat(3,1fr);} .draw-grid,.arch-grid{grid-template-columns:repeat(2,1fr);} .process-grid{grid-template-columns:1fr 1fr;gap:24px;} .tq-grid{grid-template-columns:1fr;gap:28px;} .contact-wrap,.enquiry-wrap{grid-template-columns:1fr;gap:36px;padding:46px 30px;}}
  @media (max-width:680px){.container{padding:0 22px;} .topnav-inner{padding:0 20px;} section{padding:64px 0;} .value-grid{grid-template-columns:1fr;} .gal-grid,.arch-grid{grid-template-columns:repeat(2,1fr);gap:14px;} .draw-grid{grid-template-columns:1fr;} .skills-grid{grid-template-columns:1fr;gap:30px;} .glance-grid{grid-template-columns:repeat(2,1fr);gap:24px 16px;} .process-grid{grid-template-columns:1fr;} .enquiry-form{grid-template-columns:1fr;} .hero-inner{padding:110px 22px 66px;} .scroll-cue{left:22px;} .contact-wrap{padding:38px 22px;} .lb-prev{left:6px;width:40px;height:40px;} .lb-next{right:6px;width:40px;height:40px;} .lb-caption{padding:0 46px;}}
</style></head><body><div class=container style="padding:30px 40px"><div class=eyebrow>Interiors gallery</div><div class=gal-grid><figure class=card><div class="card-media cover"><img src="images/wagB_09.jpg"></div><figcaption><span class=card-title>Master Bedroom</span></figcaption></figure><figure class=card><div class="card-media cover"><img src="images/wakad_02.jpg"></div><figcaption><span class=card-title>Dining</span></figcaption></figure><figure class=card><div class="card-media cover"><img src="images/kharadi_11.jpg"></div><figcaption><span class=card-title>Living Room</span></figcaption></figure><figure class=card><div class="card-media cover"><img src="images/pune_04.jpg"></div></figure></div></div><section class=dark><div class=container><div class="eyebrow on-dark">Working drawings</div><div class=draw-grid><figure class=card><div class="card-media contain"><img src="images/nanded_05.jpg"></div></figure><figure class=card><div class="card-media contain"><img src="images/detail_01.jpg"></div></figure><figure class=card><div class="card-media contain"><img src="images/nanded_12.jpg"></div></figure></div></div></section></body></html>
